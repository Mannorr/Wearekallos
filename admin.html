<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin &#x2014; K&#x3AC;&#x3BB;&#x3BB;&#x3BF;&#x3C2;</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#EE2924;--amber:#F9A11B;--blue:#3957A7;--fs:'Instrument Serif',Georgia,serif;--ss:'Instrument Sans',sans-serif}
[data-theme="dark"]{--bg:#111110;--bg2:#161615;--bg3:#1e1e1c;--line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);--text:#F7F7F5;--muted:rgba(247,247,245,.4);--faint:rgba(247,247,245,.1);--card:#181817;--inp:#1a1a18;--inp-b:rgba(255,255,255,.12)}
[data-theme="light"]{--bg:#F7F7F5;--bg2:#EEEEEC;--bg3:#E4E4E2;--line:rgba(0,0,0,.07);--line2:rgba(0,0,0,.13);--text:#111110;--muted:rgba(17,17,16,.45);--faint:rgba(17,17,16,.1);--card:#fff;--inp:#EBEBEA;--inp-b:rgba(0,0,0,.13)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ss);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}

/* ── TOPBAR ── */
.bar{position:sticky;top:0;z-index:200;background:var(--bg2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px}
.bar-l{display:flex;align-items:center;gap:12px}
.bar-logo{font-family:var(--fs);font-style:italic;font-size:18px;color:var(--text)}
.bar-divider{width:1px;height:16px;background:var(--line2)}
.bar-tag{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.bar-r{display:flex;align-items:center;gap:14px}
.bar-view{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.bar-view:hover{color:var(--text)}
.theme-tog{width:36px;height:20px;background:var(--bg3);border:1px solid var(--line2);border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;transition:background .3s}
.theme-tog::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text);transition:transform .3s}
[data-theme="light"] .theme-tog::after{transform:translateX(16px)}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 52px)}
.panel{background:var(--bg2);border-right:1px solid var(--line);padding:24px;overflow-y:auto}
.panel-title{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}

/* ── FORM ── */
.f{margin-bottom:14px}
.f label{display:block;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.f label span{color:var(--red)}
.inp{width:100%;background:var(--inp);border:1px solid var(--inp-b);color:var(--text);font-family:var(--ss);font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none;border-radius:0}
.inp:focus{border-color:var(--red)}
.inp::placeholder{color:var(--muted);opacity:.7}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── MEDIA SLOTS ── */
.slots{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px}
.slot{position:relative;aspect-ratio:1/1;border:1px dashed var(--inp-b);background:var(--inp);cursor:pointer;overflow:hidden;transition:border-color .2s}
.slot:hover{border-color:var(--red)}
.slot.has{border-style:solid;border-color:var(--line2)}
.slot.busy{border-color:var(--amber)}
.slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:1}
.slot-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;pointer-events:none}
.slot-plus{font-size:18px;color:var(--faint);line-height:1}
.slot-n{font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.slot-prev{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;display:block}
.slot-del{position:absolute;top:3px;right:3px;width:18px;height:18px;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;z-index:3;opacity:0;transition:opacity .15s}
.slot.has:hover .slot-del{opacity:1}
.slot-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--amber);transition:width .2s;z-index:4}
.slot-cover{position:absolute;bottom:2px;left:2px;font-size:7px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--red);color:#fff;padding:1px 4px;z-index:3}
.slot-type{position:absolute;bottom:2px;right:2px;font-size:7px;font-weight:700;background:rgba(0,0,0,.7);color:#fff;padding:1px 4px;z-index:3}
.slot-hint{font-size:10px;color:var(--faint);line-height:1.5}

/* ── TOGGLES ── */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.tog-row label{font-size:12px;font-weight:400;color:var(--muted)}
.tog{width:36px;height:20px;background:var(--bg3);border:1px solid var(--inp-b);border-radius:10px;position:relative;cursor:pointer;transition:background .25s}
.tog.on{background:var(--red);border-color:var(--red)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .25s}
.tog.on::after{transform:translateX(16px)}

/* ── BTNS ── */
.btn-add{width:100%;padding:12px;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--red);border:none;cursor:pointer;transition:background .2s;margin-top:10px}
.btn-add:hover{background:#c71f1c}.btn-add:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed}
.btn-sec{width:100%;padding:9px;margin-top:8px;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--line2);cursor:pointer;transition:border-color .2s,color .2s}
.btn-sec:hover{border-color:var(--text);color:var(--text)}
.btn-danger{margin-top:28px;padding-top:20px;border-top:1px solid var(--line)}
.btn-danger button{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border:1px solid var(--line2);background:none;color:var(--muted);cursor:pointer;transition:border-color .2s,color .2s}
.btn-danger button:hover{border-color:var(--red);color:var(--red)}

/* ── MAIN PANEL ── */
.main{padding:28px;overflow-y:auto}
.main-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.main-h{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.pill{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}
.sorts{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.sorts span{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);align-self:center}
.sb{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--line);padding:4px 10px;cursor:pointer;transition:border-color .2s,color .2s}
.sb:hover,.sb.on{border-color:var(--text);color:var(--text)}
.reorder-hint{font-size:9px;color:var(--faint);margin-left:auto;align-self:center}

/* ── PROJECT LIST ── */
.plist{display:flex;flex-direction:column;gap:8px}
.prow{display:grid;grid-template-columns:20px 80px 1fr 36px 60px;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);padding:12px 14px;cursor:grab;transition:border-color .3s,background .3s}
.prow:hover{border-color:var(--line2)}.prow.drag-over{border-color:var(--red);background:rgba(238,41,36,.04)}.prow.dragging{opacity:.35}.prow.active{border-color:var(--amber)}
.handle{display:flex;flex-direction:column;gap:2px;color:var(--faint)}
.handle span{display:block;width:12px;height:1px;background:currentColor}
.thumb-row{display:flex;gap:2px;height:44px;overflow:hidden}
.th{flex-shrink:0;background:var(--bg3);overflow:hidden;height:44px;display:flex;align-items:center;justify-content:center}
.th:first-child{width:44px}.th:not(:first-child){width:16px}
.th img,.th video{width:100%;height:100%;object-fit:cover;display:block}
.th-ph{font-family:var(--fs);font-style:italic;font-size:15px;color:var(--faint)}
.th-more{font-size:7px;font-weight:700;color:var(--muted)}
.pmeta .pt{font-size:13px;font-weight:500;margin-bottom:3px}
.pmeta .ps{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:1px solid var(--faint)}
.badge.cat{color:var(--red);border-color:rgba(238,41,36,.3)}
.badge.yr{color:var(--muted)}
.badge.feat{color:var(--amber);border-color:rgba(249,161,27,.3)}
.badge.mc{color:var(--faint)}
.p-actions{display:flex;gap:5px}
.act-btn{width:26px;height:26px;border:1px solid var(--line);background:none;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:border-color .2s,color .2s,background .2s}
.act-btn.e:hover{border-color:var(--amber);color:var(--amber)}
.act-btn.d:hover{border-color:var(--red);color:var(--red);background:rgba(238,41,36,.06)}
.vis-tog{width:30px;height:16px;background:var(--bg3);border:1px solid var(--inp-b);border-radius:8px;position:relative;cursor:pointer;transition:background .25s}
.vis-tog.on{background:rgba(57,87,167,.5);border-color:var(--blue)}
.vis-tog::after{content:'';position:absolute;top:1px;left:1px;width:12px;height:12px;border-radius:50%;background:var(--muted);transition:transform .25s,background .25s}
.vis-tog.on::after{transform:translateX(14px);background:var(--blue)}

/* ── EMPTY ── */
.empty{text-align:center;padding:72px 0}
.empty .eg{font-family:var(--fs);font-style:italic;font-size:48px;color:var(--faint);margin-bottom:10px}
.empty p{font-size:12px;color:var(--muted)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--text);color:var(--bg);font-size:11px;font-weight:600;padding:11px 18px;transform:translateY(70px);opacity:0;transition:transform .3s cubic-bezier(0.22,1,0.36,1),opacity .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}.toast.err{background:var(--red);color:#fff}
</style>
</head>
<body>

<div class="bar">
  <div class="bar-l">
    <span class="bar-logo">&#x39A;&#x3AC;&#x3BB;&#x3BB;&#x3BF;&#x3C2;</span>
    <div class="bar-divider"></div>
    <span class="bar-tag">Portfolio Admin</span>
  </div>
  <div class="bar-r">
    <a href="portfolio.html" target="_blank" class="bar-view">
      <svg width="11" height="11" fill="none" viewBox="0 0 12 12"><path d="M1 6s2-4 5-4 5 4 5 4-2 4-5 4-5-4-5-4Z" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="6" r="1.5" stroke="currentColor" stroke-width="1.2"/></svg>
      View Portfolio
    </a>
    <button class="theme-tog" id="tog"></button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR FORM -->
  <aside class="panel">
    <div class="panel-title" id="form-title">Add Project</div>

    <div class="f"><label>Title <span>*</span></label><input class="inp" id="f-title" type="text" placeholder="e.g. Fuse Conference"></div>

    <div class="f-row">
      <div class="f">
        <label>Category <span>*</span></label>
        <select class="inp" id="f-cat">
          <option value="">&#x2014; Select &#x2014;</option>
          <option value="brand">Brand Identity</option>
          <option value="visual">Visual Design</option>
          <option value="print">Print &amp; Packaging</option>
          <option value="event">Events</option>
        </select>
      </div>
      <div class="f"><label>Year</label><input class="inp" id="f-year" type="number" value="2025" min="2015" max="2035"></div>
    </div>

    <div class="f"><label>Description</label><textarea class="inp" id="f-desc" placeholder="Brief description of the project..."></textarea></div>

    <div class="f">
      <label>Aspect Ratio</label>
      <select class="inp" id="f-ratio">
        <option value="16/10">Wide (16:10)</option>
        <option value="4/3">Landscape (4:3)</option>
        <option value="3/4">Portrait (3:4)</option>
        <option value="1/1">Square (1:1)</option>
      </select>
    </div>

    <div class="f">
      <label>Media <span style="font-weight:300;text-transform:none;letter-spacing:0;font-size:9px;color:var(--muted)">(up to 5 &#x2014; slot 1 is cover)</span></label>
      <div class="slots" id="slots"></div>
      <div class="slot-hint">Images &amp; videos upload directly to Cloudinary CDN.</div>
    </div>

    <div class="tog-row"><label>Featured (spans 2 columns)</label><button class="tog" id="f-feat"></button></div>
    <div class="tog-row"><label>Visible on portfolio</label><button class="tog on" id="f-vis"></button></div>

    <button class="btn-add" id="btn-save">Add Project</button>
    <button class="btn-sec" id="btn-cancel" style="display:none">Cancel</button>

    <div class="btn-danger">
      <button id="btn-clearall">Clear all projects</button>
    </div>
  </aside>

  <!-- MAIN LIST -->
  <main class="main">
    <div class="main-top">
      <span class="main-h">Projects</span>
      <span class="pill" id="count">0</span>
    </div>
    <div class="sorts">
      <span>Sort:</span>
      <button class="sb on" data-s="custom">Custom</button>
      <button class="sb" data-s="yd">Year &#x2193;</button>
      <button class="sb" data-s="ya">Year &#x2191;</button>
      <button class="sb" data-s="az">A&#x2013;Z</button>
      <span class="reorder-hint">&#x2195; Drag rows to reorder</span>
    </div>
    <div class="plist" id="plist"></div>
    <div class="empty" id="empty">
      <div class="eg">&#x39A;</div>
      <p>No projects yet. Add your first one.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────
const CLOUD  = 'dhn7puiqc';
const PRESET = 'kallos';
const CURL   = 'https://api.cloudinary.com/v1_1/' + CLOUD + '/upload';
const KEY    = 'kallos_portfolio_v2';
const CATS   = {brand:'Brand Identity',visual:'Visual Design',print:'Print & Packaging',event:'Events'};
const MAX    = 5;

// ── State ────────────────────────────────────────────────
let projects = [];
let editId   = null;
let dragSrc  = null;
// slots[i] = null | { url, thumb, type, filename, publicId }
let slots    = Array(MAX).fill(null);

function load()       { try { projects = JSON.parse(localStorage.getItem(KEY)) || []; } catch { projects = []; } }
function persist()    { localStorage.setItem(KEY, JSON.stringify(projects)); }
function uid()        { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── Theme ────────────────────────────────────────────────
const html = document.documentElement;
html.setAttribute('data-theme', localStorage.getItem('kallos-theme') || 'dark');
document.getElementById('tog').addEventListener('click', () => {
  const n = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', n); localStorage.setItem('kallos-theme', n);
});

// ── Cloudinary upload ────────────────────────────────────
async function uploadFile(file, idx) {
  const isVid = file.type.startsWith('video/');
  // Show local preview + progress immediately
  const local = URL.createObjectURL(file);
  renderSlots(); // re-render to show busy state
  const slotEl = document.querySelector('.slot[data-i="' + idx + '"]');
  if (slotEl) {
    slotEl.classList.add('busy');
    const pr = document.createElement('div'); pr.className = 'slot-prog'; pr.style.width = '0';
    slotEl.appendChild(pr);
    let pct = 0;
    const iv = setInterval(() => { pct = Math.min(pct + Math.random()*18, 88); pr.style.width = pct + '%'; }, 180);
    slotEl._iv = iv; slotEl._pr = pr;
    // Preview
    const prev = isVid ? document.createElement('video') : document.createElement('img');
    prev.src = local; prev.className = 'slot-prev';
    if (isVid) { prev.muted = true; prev.autoplay = true; prev.loop = true; }
    slotEl.appendChild(prev);
  }

  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', PRESET);
  fd.append('folder', 'kallos-portfolio');

  try {
    const res  = await fetch(CURL, { method:'POST', body:fd });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    URL.revokeObjectURL(local);
    if (slotEl) {
      clearInterval(slotEl._iv);
      if (slotEl._pr) { slotEl._pr.style.width = '100%'; }
      slotEl.classList.remove('busy');
    }
    const isV = data.resource_type === 'video';
    const base = data.secure_url.replace('/upload/', '/upload/');
    const th   = isV
      ? data.secure_url.replace('/upload/', '/upload/w_400,h_300,c_fill,so_0/')
      : data.secure_url.replace('/upload/', '/upload/w_400,h_300,c_fill,q_auto,f_auto/');
    slots[idx] = { url: data.secure_url, thumb: th, type: isV ? 'video' : 'image', filename: data.original_filename, publicId: data.public_id };
    renderSlots();
    toast('Uploaded ✓');
  } catch (e) {
    if (slotEl) { clearInterval(slotEl._iv); slotEl.classList.remove('busy'); }
    URL.revokeObjectURL(local);
    toast('Upload failed: ' + e.message, true);
  }
}

// ── Slot UI ──────────────────────────────────────────────
function renderSlots() {
  const wrap = document.getElementById('slots');
  wrap.innerHTML = '';
  for (let i = 0; i < MAX; i++) {
    const el = document.createElement('div');
    el.className = 'slot' + (slots[i] ? ' has' : '');
    el.dataset.i = i;
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*,video/*';
    inp.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0], i); });
    el.appendChild(inp);
    if (slots[i]) {
      const m = slots[i];
      const prev = m.type === 'video' ? document.createElement('video') : document.createElement('img');
      prev.src = m.thumb || m.url; prev.className = 'slot-prev';
      if (m.type === 'video') { prev.muted = true; prev.autoplay = true; prev.loop = true; prev.playsInline = true; }
      el.appendChild(prev);
      const del = document.createElement('button'); del.className = 'slot-del'; del.textContent = '&#x2715;';
      del.addEventListener('click', e => { e.stopPropagation(); slots[i] = null; renderSlots(); });
      el.appendChild(del);
      if (i === 0) { const c = document.createElement('div'); c.className = 'slot-cover'; c.textContent = 'Cover'; el.appendChild(c); }
      const t = document.createElement('div'); t.className = 'slot-type'; t.textContent = m.type === 'video' ? 'VID' : 'IMG'; el.appendChild(t);
    } else {
      el.innerHTML += '<div class="slot-ph"><span class="slot-plus">+</span><span class="slot-n">' + (i+1) + '</span></div>';
    }
    // Drag file onto slot
    el.addEventListener('dragover', e => { e.preventDefault(); el.style.borderColor = 'var(--red)'; });
    el.addEventListener('dragleave', () => el.style.borderColor = '');
    el.addEventListener('drop', e => { e.preventDefault(); el.style.borderColor = ''; const f = e.dataTransfer.files[0]; if(f) uploadFile(f, i); });
    wrap.appendChild(el);
  }
}

// ── Form ─────────────────────────────────────────────────
const fTitle = document.getElementById('f-title');
const fCat   = document.getElementById('f-cat');
const fYear  = document.getElementById('f-year');
const fDesc  = document.getElementById('f-desc');
const fRatio = document.getElementById('f-ratio');
const fFeat  = document.getElementById('f-feat');
const fVis   = document.getElementById('f-vis');

[fFeat, fVis].forEach(t => t.addEventListener('click', () => t.classList.toggle('on')));

function resetForm() {
  fTitle.value = ''; fCat.value = ''; fYear.value = 2025; fDesc.value = ''; fRatio.value = '16/10';
  fFeat.classList.remove('on'); fVis.classList.add('on');
  slots = Array(MAX).fill(null); renderSlots();
  editId = null;
  document.getElementById('form-title').textContent = 'Add Project';
  document.getElementById('btn-save').textContent = 'Add Project';
  document.getElementById('btn-cancel').style.display = 'none';
  document.querySelectorAll('.prow.active').forEach(r => r.classList.remove('active'));
  fTitle.style.outline = ''; fCat.style.outline = '';
}
document.getElementById('btn-cancel').addEventListener('click', resetForm);

document.getElementById('btn-save').addEventListener('click', () => {
  const title = fTitle.value.trim(), cat = fCat.value;
  if (!title) { fTitle.style.outline = '2px solid var(--red)'; fTitle.focus(); return; }
  if (!cat)   { fCat.style.outline   = '2px solid var(--red)'; return; }
  fTitle.style.outline = ''; fCat.style.outline = '';

  const proj = {
    id:       editId || uid(),
    title, cat,
    year:     parseInt(fYear.value) || 2025,
    desc:     fDesc.value.trim(),
    ratio:    fRatio.value,
    featured: fFeat.classList.contains('on'),
    visible:  fVis.classList.contains('on'),
    media:    slots.filter(Boolean),
    updatedAt: Date.now(),
  };

  if (editId) {
    const i = projects.findIndex(p => p.id === editId);
    if (i > -1) projects[i] = proj; else projects.unshift(proj);
    toast('Updated ✓');
  } else {
    projects.unshift(proj);
    toast('Added ✓');
  }

  persist(); resetForm(); renderList();
});

// ── List ─────────────────────────────────────────────────
function renderList(arr) {
  const list = arr || projects;
  document.getElementById('count').textContent = list.length;
  document.getElementById('empty').style.display = list.length ? 'none' : 'block';
  const el = document.getElementById('plist'); el.innerHTML = '';

  list.forEach(p => {
    const mc = (p.media||[]).length;
    const row = document.createElement('div');
    row.className = 'prow' + (p.id === editId ? ' active' : '');
    row.dataset.id = p.id; row.draggable = true;

    // Thumb strip
    const strip = document.createElement('div'); strip.className = 'thumb-row';
    const tm = (p.media||[]).slice(0,4);
    if (!tm.length) {
      strip.innerHTML = '<div class="th" style="width:44px"><span class="th-ph">' + (p.title[0]||'?') + '</span></div>';
    } else {
      tm.forEach((m,ti) => {
        const th = document.createElement('div'); th.className = 'th'; th.style.width = ti===0 ? '44px':'16px';
        const src = m.thumb || m.url;
        th.innerHTML = m.type==='video'
          ? '<video src="'+src+'" muted playsinline style="width:100%;height:100%;object-fit:cover"></video>'
          : '<img src="'+src+'" style="width:100%;height:100%;object-fit:cover">';
        strip.appendChild(th);
      });
      if (mc>4) { const th=document.createElement('div');th.className='th';th.style.cssText='width:16px;display:flex;align-items:center;justify-content:center';th.innerHTML='<span class="th-more">+' + (mc-4) + '</span>';strip.appendChild(th); }
    }

    row.innerHTML =
      '<div class="handle"><span></span><span></span><span></span></div>' +
      '<div></div>' +
      '<div class="pmeta">' +
        '<div class="pt">'+p.title+'</div>' +
        '<div class="ps">' +
          '<span class="badge cat">'+CATS[p.cat]+'</span>' +
          '<span class="badge yr">'+p.year+'</span>' +
          (p.featured?'<span class="badge feat">Featured</span>':'') +
          (mc?'<span class="badge mc">'+mc+' file'+(mc>1?'s':'')+'</span>':'<span class="badge mc">No media</span>') +
        '</div>' +
      '</div>' +
      '<div class="p-actions">' +
        '<button class="act-btn e" title="Edit"><svg width="11" height="11" fill="none" viewBox="0 0 12 12"><path d="M8.5 1.5l2 2L3 11H1V9l7.5-7.5Z" stroke="currentColor" stroke-width="1.1"/></svg></button>' +
        '<button class="act-btn d" title="Delete"><svg width="11" height="11" fill="none" viewBox="0 0 12 12"><path d="M2 3h8M5 3V2h2v1M4.5 5v4M7.5 5v4M3 3l.5 6.5h5L9 3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg></button>' +
      '</div>' +
      '<div class="vis-tog '+(p.visible?'on':'')+'"></div>';

    row.children[1].replaceWith(strip);

    // Drag reorder
    row.addEventListener('dragstart', () => { dragSrc=p.id; row.classList.add('dragging'); });
    row.addEventListener('dragend',   () => { row.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(r=>r.classList.remove('drag-over')); });
    row.addEventListener('dragover',  e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault(); row.classList.remove('drag-over');
      if (dragSrc && dragSrc!==p.id) {
        const fi=projects.findIndex(x=>x.id===dragSrc), ti=projects.findIndex(x=>x.id===p.id);
        if(fi>-1&&ti>-1){const[m]=projects.splice(fi,1);projects.splice(ti,0,m);persist();renderList();}
      }
    });

    // Visibility toggle
    row.querySelector('.vis-tog').addEventListener('click', () => {
      const pr=projects.find(x=>x.id===p.id);
      if(pr){pr.visible=!pr.visible;persist();renderList();toast(pr.visible?'Now visible':'Hidden');}
    });

    // Edit
    row.querySelector('.act-btn.e').addEventListener('click', () => {
      const pr=projects.find(x=>x.id===p.id); if(!pr) return;
      editId=p.id;
      fTitle.value=pr.title; fCat.value=pr.cat; fYear.value=pr.year;
      fDesc.value=pr.desc||''; fRatio.value=pr.ratio||'16/10';
      if(pr.featured) fFeat.classList.add('on'); else fFeat.classList.remove('on');
      if(pr.visible)  fVis.classList.add('on');  else fVis.classList.remove('on');
      slots=Array(MAX).fill(null);
      (pr.media||[]).forEach((m,i)=>{ if(i<MAX) slots[i]=m; });
      renderSlots();
      document.getElementById('form-title').textContent='Edit Project';
      document.getElementById('btn-save').textContent='Save Changes';
      document.getElementById('btn-cancel').style.display='block';
      renderList();
      document.querySelector('.panel').scrollTo({top:0,behavior:'smooth'});
    });

    // Delete
    row.querySelector('.act-btn.d').addEventListener('click', () => {
      if(!confirm('Delete "'+p.title+'"?')) return;
      projects=projects.filter(x=>x.id!==p.id);
      persist(); if(editId===p.id) resetForm(); renderList(); toast('Deleted');
    });

    el.appendChild(row);
  });
}

// Sort
document.querySelectorAll('.sb').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.sb').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    const s=b.dataset.s, arr=[...projects];
    if(s==='yd') arr.sort((a,b)=>b.year-a.year);
    if(s==='ya') arr.sort((a,b)=>a.year-b.year);
    if(s==='az') arr.sort((a,b)=>a.title.localeCompare(b.title));
    renderList(s==='custom'?undefined:arr);
  });
});

// Clear all
document.getElementById('btn-clearall').addEventListener('click', () => {
  if(!confirm('Delete ALL projects? This cannot be undone.')) return;
  projects=[]; persist(); resetForm(); renderList(); toast('Cleared');
});

// Toast
let tt;
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(err?' err':'');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2600);
}

// Init
load(); renderSlots(); renderList();
</script>
</body>
</html>
